name: FR Build Push 

on:
  push:
    branches:
      - master
    paths:
      - 'frontend/**' # Trigger on changes to any files in the frontend directory
      - '.github/workflows/build-docker-push-fr.yaml'
      - '!frontend/**/*.md'  # Exclude markdown files from triggering the workflow
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  frontend-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Node Code
        working-directory: ./frontend
        run: |
          npm install
          # Replace with your actual test command (e.g., npm run test)
          echo "Running frontend tests..."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          tags: nasat-frontend:test

      - name: Test Docker Container
        run: |
          docker run -d -p 8080:80 --name frontend-test nasat-frontend:test
          sleep 5 # Wait for Nginx to start
          if [ "$(docker inspect -f '{{.State.Running}}' frontend-test)" != "true" ]; then
            echo "Frontend container crashed on startup"
            docker logs frontend-test
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nasat-frontend:latest
            ${{ env.IMAGE_PREFIX }}/nasat-frontend:${{ github.sha }}

      - name: Update K8s Image Tag in Git
        run: |
          # Use sed to replace the image tag with the new GitHub SHA
          sed -i "s|image: ${{ env.IMAGE_PREFIX }}/nasat-frontend:.*|image: ${{ env.IMAGE_PREFIX }}/nasat-frontend:${{ github.sha }}|g" k8s/frontend/Frontend.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/frontend/Frontend.yaml
          git commit -m "chore: update frontend image tag to ${{ github.sha }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
