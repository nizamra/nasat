name: BK Build Push

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**' # Trigger on changes to any files in the backend directory
      - '.github/workflows/build-docker-push-bk.yaml'
      - '!backend/**/*.md'  # Exclude markdown files from triggering the workflow
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test Python Code
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          # Replace with your actual test command (e.g., pytest, python manage.py test)
          echo "Running backend tests..." 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          tags: nasat-backend:test

      - name: Test Docker Container
        run: |
          docker run -d -p 8000:8000 --name backend-test nasat-backend:test
          sleep 5 # Wait for Gunicorn to start
          # Check if container is still running (didn't crash on startup)
          if [ "$(docker inspect -f '{{.State.Running}}' backend-test)" != "true" ]; then
            echo "Backend container crashed on startup"
            docker logs backend-test
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nasat-backend:latest
            ${{ env.IMAGE_PREFIX }}/nasat-backend:${{ github.sha }}

      - name: Update K8s Image Tag in Git
        run: |
          # Use sed to replace the image tag with the new GitHub SHA
          sed -i "s|image: ${{ env.IMAGE_PREFIX }}/nasat-backend:.*|image: ${{ env.IMAGE_PREFIX }}/nasat-backend:${{ github.sha }}|g" k8s/backend/Backend.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/Backend.yaml
          git commit -m "chore: update backend image tag to ${{ github.sha }}"
          git push
          env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
