name: Build, Test, and Push Nasat

on:
  push:
    branches:
      - master

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: ${{ secrets.DOCKER_USERNAME }}

jobs:
  backend-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Test Python Code
        working-directory: ./nasat/backend
        run: |
          pip install -r requirements.txt
          # Replace with your actual test command (e.g., pytest, python manage.py test)
          echo "Running backend tests..." 

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: ./nasat/backend
          file: ./nasat/backend/Dockerfile
          load: true
          tags: nasat-backend:test

      - name: Test Docker Container
        run: |
          docker run -d -p 8000:8000 --name backend-test nasat-backend:test
          sleep 5 # Wait for Gunicorn to start
          # Check if container is still running (didn't crash on startup)
          if [ "$(docker inspect -f '{{.State.Running}}' backend-test)" != "true" ]; then
            echo "Backend container crashed on startup"
            docker logs backend-test
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./nasat/backend
          file: ./nasat/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nasat-backend:latest
            ${{ env.IMAGE_PREFIX }}/nasat-backend:${{ github.sha }}

  frontend-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test Node Code
        working-directory: ./nasat/frontend
        run: |
          npm ci
          # Replace with your actual test command (e.g., npm run test)
          echo "Running frontend tests..."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: ./nasat/frontend
          file: ./nasat/frontend/Dockerfile
          load: true
          tags: nasat-frontend:test

      - name: Test Docker Container
        run: |
          docker run -d -p 8080:80 --name frontend-test nasat-frontend:test
          sleep 5 # Wait for Nginx to start
          if [ "$(docker inspect -f '{{.State.Running}}' frontend-test)" != "true" ]; then
            echo "Frontend container crashed on startup"
            docker logs frontend-test
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./nasat/frontend
          file: ./nasat/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/nasat-frontend:latest
            ${{ env.IMAGE_PREFIX }}/nasat-frontend:${{ github.sha }}