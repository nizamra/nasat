apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nasat
  namespace: default
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  source:
    repoURL: https://github.com/nizamra/nasat
    targetRevision: master
    path: nasat/k8s
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
