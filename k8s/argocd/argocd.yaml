apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nasat
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: nasat
  source:
    repoURL: https://github.com/nizamra/nasat
    targetRevision: master
    path: k8s
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
