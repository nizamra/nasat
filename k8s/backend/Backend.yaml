apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nizamra/nasat-backend:14ef94a5e764640ae45ca4dcc68a90b525373c13
          env:
            - name: DB_HOST
              value: postgres
          ports:
            - containerPort: 8000
      imagePullSecrets:
        - name: dockerhub-cred
