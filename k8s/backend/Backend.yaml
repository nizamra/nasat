apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: db-migrate
          image: your-registry/backend-image:latest
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
      containers:
        - name: backend
          image: nizamra/nasat-backend:3ccc424cc04a7f1b3748878565119c5f19f3fd3c
          env:
            - name: DB_HOST
              value: postgres
          ports:
            - containerPort: 8000
      imagePullSecrets:
        - name: dockerhub-cred
