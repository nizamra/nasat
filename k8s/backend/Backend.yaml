apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nizamra/nasat-backend:ac63bbe038e28444bbdc59a55f03c9127bf5a493
          env:
            - name: DB_HOST
              value: postgres
          ports:
            - containerPort: 8000
      imagePullSecrets:
        - name: dockerhub-cred
