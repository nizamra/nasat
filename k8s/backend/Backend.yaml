apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nizamra/nasat-backend:976be4a2a124d776a1a8c2401d97dd51b1d78785
          env:
            - name: DB_HOST
              value: postgres
          ports:
            - containerPort: 8000
      imagePullSecrets:
        - name: dockerhub-cred
