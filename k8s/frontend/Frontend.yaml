apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nasat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nizamra/nasat-frontend:df62c7daef563af66fd709f5b26de9e6e743e655
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: dockerhub-cred
