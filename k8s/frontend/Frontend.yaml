apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: nasat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: nizamra/nasat-frontend:fb3e78b3b31be4166cd91bc93161e88b9cfd983c
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
      imagePullSecrets:
        - name: dockerhub-cred
