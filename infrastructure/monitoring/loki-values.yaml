loki-stack:
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: 'filesystem'
    limits_config:
      retention_period: 720h
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 720h
    rbac:
      pspEnabled: false

  promtail:
    enabled: true
    rbac:
      pspEnabled: false
