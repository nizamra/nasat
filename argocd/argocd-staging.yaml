apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nasat-staging
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: nasat-staging
  source:
    repoURL: https://github.com/nizamra/nasat
    targetRevision: staging
    path: k8s
    directory:
      recurse: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true